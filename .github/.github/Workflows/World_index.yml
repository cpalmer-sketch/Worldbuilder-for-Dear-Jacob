name: Worldbuilder Index and Check

on: [push, pull_request]

jobs:
  update-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          pip install python-docx python-pptx PyPDF2 pandas openpyxl
      - name: Run index update
        run: |
          python md_creator.py
      - name: Basic file check
        run: |
          ls docs/characters docs/acs docs/locations docs/events docs/lore docs/plot_threads docs/brainstorming || true
